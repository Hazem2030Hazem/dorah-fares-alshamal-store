<head>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Crect%20fill%3D%27%25231E88E5%27%20rx%3D%2715%27%20width%3D%27100%27%20height%3D%27100%27%2F%3E%3Ctext%20x%3D%2750%27%20y%3D%2765%27%20font-size%3D%2750%27%20text-anchor%3D%27middle%27%20fill%3D%27white%27%3E%E2%9A%A1%3C%2Ftext%3E%3C%2Fsvg%3E">
    <title>عن الشركة | درة فارس الشمال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Audio Autoplay Script -->
    <script src="audio-autoplay.js"></script>
    
    <style>
        /* ... نفس الـ CSS ... */
    </style>
</head>
<body>
    <!-- ... نفس الـ HTML ... -->

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 شركة درة فارس الشمال. جميع الحقوق محفوظة. | <a href="index.html">الرئيسية</a></p>
    </footer>

    <script>
        // Mute toggle - يشتغل مع audio-autoplay.js
        document.getElementById('muteToggle').addEventListener('click', function(e) {
            e.stopPropagation();
            window.toggleAudio();
        });

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('doraTheme', next);

            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.src = next === 'dark' ? 'https://i.imgur.com/0EaJuGh.gif' : 'https://i.imgur.com/MG2fQ7j.jpeg';
            }

            if (next === 'dark') {
                document.body.style.background = 'url(https://i.imgur.com/PCW2FZb.jpeg) center/cover no-repeat fixed';
            } else {
                document.body.style.background = 'linear-gradient(135deg, #fff5f5 0%, #ffe0e0 25%, #ffc0c0 50%, #ffe0e0 75%, #fff5f5 100%)';
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('doraTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.src = saved === 'dark' ? 'https://i.imgur.com/0EaJuGh.gif' : 'https://i.imgur.com/MG2fQ7j.jpeg';
            }
            if (saved === 'light') {
                document.body.style.background = 'linear-gradient(135deg, #fff5f5 0%, #ffe0e0 25%, #ffc0c0 50%, #ffe0e0 75%, #fff5f5 100%)';
            }
        }

        initTheme();
    </script>
</body>
</html>
